<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 340" font-family="'Segoe UI','PingFang SC','Microsoft YaHei',system-ui,sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f1e9"/>
      <stop offset="1" stop-color="#efe4d6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#26211880" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1280" height="340" rx="24" fill="url(#bg)"/>
  <rect x="0" y="0" width="8" height="340" rx="4" fill="#c05e3e"/>

  <!-- brand mark -->
  <rect x="64" y="58" width="56" height="56" rx="14" fill="#c05e3e"/>
  <path d="M82 86 l9 9 l17 -19" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- title -->
  <text x="140" y="104" font-size="58" font-weight="800" fill="#28251f">计划<tspan fill="#c05e3e">引航</tspan></text>
  <text x="146" y="140" font-size="24" font-weight="600" letter-spacing="3" fill="#8a8478">PLAN&#160;PILOT</text>

  <!-- tagline -->
  <text x="66" y="206" font-size="27" font-weight="700" fill="#3a352d">会追问、帮你把大目标拆到「今天先做哪一步」的规划助手</text>
  <text x="66" y="246" font-size="20" fill="#6c685f">——不是又一个让你愧疚的待办清单。</text>

  <!-- chips -->
  <g font-size="16" font-weight="600">
    <rect x="66" y="276" width="150" height="34" rx="17" fill="#fff" stroke="#e3ded3"/>
    <text x="141" y="298" text-anchor="middle" fill="#6c685f">多模型接入</text>
    <rect x="226" y="276" width="150" height="34" rx="17" fill="#fff" stroke="#e3ded3"/>
    <text x="301" y="298" text-anchor="middle" fill="#6c685f">数据存本地</text>
    <rect x="386" y="276" width="126" height="34" rx="17" fill="#fff" stroke="#e3ded3"/>
    <text x="449" y="298" text-anchor="middle" fill="#6c685f">无需账号</text>
  </g>

  <!-- mini day-timeline card (the app's signature view) -->
  <g filter="url(#shadow)">
    <rect x="876" y="52" width="332" height="236" rx="16" fill="#fffefb"/>
  </g>
  <g font-size="13" fill="#9a958b" font-variant-numeric="tabular-nums">
    <line x1="924" y1="84" x2="1188" y2="84" stroke="#ece8df"/><text x="892" y="88">09</text>
    <line x1="924" y1="132" x2="1188" y2="132" stroke="#ece8df"/><text x="892" y="136">11</text>
    <line x1="924" y1="180" x2="1188" y2="180" stroke="#ece8df"/><text x="892" y="184">14</text>
    <line x1="924" y1="228" x2="1188" y2="228" stroke="#ece8df"/><text x="892" y="232">16</text>
  </g>
  <!-- blocks -->
  <g>
    <rect x="932" y="88" width="252" height="38" rx="8" fill="#f5ece4" stroke="#c05e3e"/>
    <rect x="932" y="88" width="5" height="38" rx="2.5" fill="#c05e3e"/>
    <text x="948" y="112" font-size="14" font-weight="600" fill="#7a3a25">深度工作 · 写论文</text>

    <rect x="932" y="136" width="170" height="34" rx="8" fill="#f4efdd" stroke="#ad8a40"/>
    <rect x="932" y="136" width="5" height="34" rx="2.5" fill="#ad8a40"/>
    <text x="948" y="158" font-size="14" font-weight="600" fill="#695120">组会</text>

    <rect x="932" y="186" width="220" height="34" rx="8" fill="#eeece4" stroke="#a4a094"/>
    <rect x="932" y="186" width="5" height="34" rx="2.5" fill="#a4a094"/>
    <text x="948" y="208" font-size="14" font-weight="600" fill="#5b564b">通勤 · 不可用</text>
  </g>
  <!-- now line -->
  <line x1="924" y1="232" x2="1188" y2="232" stroke="#bb5440" stroke-width="1.5" stroke-dasharray="5 4"/>
  <circle cx="924" cy="232" r="4" fill="#bb5440"/>
  <text x="1150" y="248" font-size="12" font-weight="700" fill="#bb5440">现在</text>
</svg>
